# schematize-rust — workflow de CI de referência (§13, §21, §22, §35).
# Copie para .github/workflows/ci.yml e ajuste <projeto>/comandos da sua stack.
name: ci
on:
  pull_request:
  push: { branches: [main] }

jobs:
  standards-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gate de padrões (DoD/§37) no diff
        run: bash .claude/skills/schematize-rust/scripts/check-diff.sh "origin/${{ github.base_ref || 'main' }}"
      - name: Índice de microfunções atualizado (§39)
        run: |
          node .claude/skills/schematize-rust/scripts/build-index.mjs ./internal > /tmp/idx.md || true
          # compara com o commitado; descomente quando o índice estiver versionado:
          # diff -q /tmp/idx.md <projeto>_archive/index/INDEX_FUNCTIONS.md
      - name: Scan de segredo no archive (§16.1/§32)
        run: bash .claude/skills/schematize-rust/scripts/archive-secret-scan.sh .

  test-kit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke + security + authz + hardening (PR — §22.6)
        run: |
          # <projeto> test smoke && <projeto> test security && <projeto> test authz && <projeto> test hardening
          echo "ligue ao CLI <projeto>_ops aqui"
      - name: Smoke self-check (anti verde-mentiroso — §22.3)
        run: bash .claude/skills/schematize-rust/scripts/smoke-selfcheck.sh --self-check

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: HIGH,CRITICAL, exit-code: '1' }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
